<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisitaDAVANTE</title>
  <link rel="stylesheet" href="/visitasvirtuales_frontend/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/0a4e7dfe84.js" crossorigin="anonymous"></script>
</head>

<body>
  <header>
    <div class="logo">
    <a href="/visitasvirtuales_frontend/ViewAdmin.html" class="logo-link">
    <img src="/visitasvirtuales_frontend/images/dav_white.png" alt="Logo DAVANTE" class="logo-img">
    <span id="titulo">VisitaDAVANTE</span>
    </a>
    </div>

    <div class="container__menu">
      <div class="menu">
        <i class="fa-solid fa-bars" id="movil_menu"></i>
        <div id="back_menu"></div>
        <nav id="nav">
          <ul>
            <li><a href="#" data-rol="ROLE_ADMINISTRADOR" data-page="gestionPermisos.html">Gestión de usuarios</a></li>
            <li><a href="#" data-rol="ROLE_ADMINISTRADOR" data-page="#">Gestión de centros</a></li>
            <li><a href="#" data-rol="ROLE_ADMINISTRADOR, ROLE_PROFESOR" data-page="crearPdis.html">Gestión de Puntos de Interés</a></li>
            <li><a href="#" data-rol="ROLE_ADMINISTRADOR, ROLE_PROFESOR" data-page="#">Editar Contenido Web</a></li>
          </ul>
        </nav>
      </div>
        <div class="botones-header">
          <div class="dropdown">
            <div class="user-name">Administrador</div>
            <div class="dropdown-content">
              <div class="profile-img">
                <img src="/visitasvirtuales_frontend/images/avatar-placeholder.jpg" alt="Foto de perfil" class="profile-img">
              </div>
              <div class="profile-options">
                <ul>
                  <li><a href="/visitasvirtuales_frontend/profile-setting.html">Mi cuenta</a></li>
                  <li><a href="/visitasvirtuales_frontend/profile-setting.html">Cambiar contraseña</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
  </header>

  <!-- Aquí se cargará el contenido dinámico -->
  <main id="contenido">
    <h2>Bienvenido al Panel de Administrador</h2>
    <p>Selecciona una opción del menú para comenzar.</p>
  </main>

 <script>
  // Selecciona enlaces del menú y contenedor principal
  const links = document.querySelectorAll("nav a[data-page]");
  const contenido = document.getElementById("contenido");

  // Función para cargar página dentro de un iframe
  function cargarPagina(archivo) {
    if (!archivo || archivo === "#") {
      contenido.innerHTML = `
        <h2>Bienvenido al Panel de Administrador</h2>
        <p>Selecciona una opción del menú para comenzar.</p>
      `;
      return;
    }

    // Crear iframe dinámico
    const iframe = document.createElement("iframe");
    iframe.src = `/visitasvirtuales_frontend/${archivo}`;
    iframe.style.width = "100%";
    iframe.style.height = "80vh"; 
    iframe.style.border = "none";
    iframe.style.alignContent = "center";

    // Reemplazar contenido anterior con el iframe
    contenido.innerHTML = "";
    contenido.appendChild(iframe);
  }

  // Evento de clic en los enlaces del menú
  links.forEach(link => {
    link.addEventListener("click", e => {
      e.preventDefault();
      const archivo = link.getAttribute("data-page");
      cargarPagina(archivo);

      // Quita el ID 'selected' de cualquier enlace anterior
      document.querySelectorAll('#selected').forEach(el => el.removeAttribute('id'));

      // Asigna el ID 'selected' al enlace clicado
      link.id = 'selected';
    });
  });
</script>
<script src="js/crearPdis.js"></script>
