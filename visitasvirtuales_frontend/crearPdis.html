<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear/Editar PDIs</title>
    <link rel="stylesheet" href="/visitasvirtuales_frontend/css/styles.css">
</head>
<body class="crear-pdis">
        <div id="form-container">
        <form id="formulario">
         <h2>Crear o modificar puntos de interés</h2>
        <div class="user-type">
        <button id="btnCrear" data-rol="ROLE_ADMINISTRADOR" type="button">Crear PDI</button>
        <button id="btnModificar" type="button" data-rol="ROLE_ADMINISTRADOR, ROLE_PROFESOR" class="activo">Modificar PDI</button>
        </div>

        <label for="centroSelect">Selecciona un centro</label>
        <div class="input-container">
        <select id="centroSelect">
            <option value="">-- Selecciona el centro --</option>
        </select>
        </div>
        <label id="labelPDI" for="pdiSelect">Nombre del PDI</label>

        <!-- Select para modificar -->
        <div class="input-container">
        <select id="pdiSelect" style="display: block;">
            <option value="">-- Selecciona el PDI --</option>
        </select>
        </div>

         <!-- Input para crear -->
        <div class="input-container"><input type="text" id="nombrePDI" style="display: none;">
        <label for="contenidoJson">Contenido JSON:</label>
        <textarea id="contenidoJson" placeholder='Introduce los datos'></textarea>
        </div>

        <button id="btnEnviar" class="btn-submit">Guardar PDI</button>
        <p id="mensaje"></p>

    <!-- Modal de confirmación -->
    <div id="confirmModal">
        <div id="confirmBox">
            <h3>Confirma los datos</h3>
            <pre id="confirmText"></pre>
            <button id="confirmBtn">Aceptar</button>
            <button id="cancelBtn">Cancelar</button>
        </div>
    </div> 
        </form>
        </div>
    <script src="js/crearPdis.js"></script>
</body>
</html>
