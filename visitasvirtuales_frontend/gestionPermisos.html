<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear PDIs</title>
  <link rel="stylesheet" href="/visitasvirtuales_frontend/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>

<body class="gestion-permisos">
        <div id="form-container">
        <form id="formulario">
         <h2>Añadir roles de usuario</h2>

      <div class="input-container">
        <label for="nombre">ID del usuario</label>
        <input type="text" id="nombre" name="nombre" placeholder="Introduce el ID del usuario" />
      </div>

      <div class="input-container">
        <label for="roles-usuario">Roles:</label>
        <select name="roles" id="roles-usuario">
          <option value="alumno">Alumno</option>
          <option value="profesor">Profesor</option>
        </select>
      </div>

      <div class="input-submit">
        <button id="btn-crear-pdi">Asignar rol</button>
      </div>

      <p id="mensaje"></p>

    </form>
    </div>
</body>

</html>
