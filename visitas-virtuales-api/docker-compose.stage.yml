services:
  api_service:
    build: .
    container_name: vv-api
    image: visitas-virtuales-api:0.1.0
    restart: always
    environment:
      - APP_STAGE=stage
    env_file:
      - .env.stage
    depends_on:
      - postgres_service
    networks:
      - vv-network

  postgres_service:
    image: postgres:16
    container_name: vv-postgres
    restart: always
    env_file:
      - .env.stage
    environment:
      TZ: Europe/Madrid
    volumes:
      - pgdata-stage:/var/lib/postgresql/data
    networks:
      - vv-network

  nginx_service:
    image: nginx:alpine
    container_name: vv-nginx
    restart: always
    ports:
      - '8080:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Montar los certificados SSL desde el host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - postgres_service
      - api_service
    networks:
      - vv-network

networks:
  vv-network:
    driver: bridge

volumes:
  pgdata-stage:
