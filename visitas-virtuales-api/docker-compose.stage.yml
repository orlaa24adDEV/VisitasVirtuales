services:
  api_service:
    build: .
    container_name: vv-api
    image: visitas-virtuales-api:0.1.0
    ports:
      - '8000:8000'
    restart: always
    environment:
      - APP_STAGE=stage
    env_file:
      - .env.stage
    depends_on:
      - postgres_service
    networks:
      - vv-network

  postgres_service:
    image: postgres:16
    container_name: vv-postgres
    restart: always
    env_file:
      - .env.stage
    environment:
      TZ: Europe/Madrid
    volumes:
      - pgdata-stage:/var/lib/postgresql/data
    networks:
      - vv-network

networks:
  vv-network:
    driver: bridge

volumes:
  pgdata-stage:
