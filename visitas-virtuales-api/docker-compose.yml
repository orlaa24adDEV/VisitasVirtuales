services:
  postgres_service:
    image: postgres
    container_name: vv-postgres
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Madrid
    ports:
      - '5433:5432'
    networks:
      - vv-network
    volumes:
      - pgdata-dev:/var/lib/postgresql/

networks:
  vv-network:
    driver: bridge

volumes:
  pgdata-dev:
