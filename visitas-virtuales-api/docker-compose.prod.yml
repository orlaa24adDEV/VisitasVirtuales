services:
  api_service:
    build: .
    container_name: vv-api
    restart: always
    env_file:
      - .env.prod
    depends_on:
      - postgres_service
    networks:
      - vv-network

  postgres_service:
    image: postgres:16
    container_name: vv-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Madrid
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vv-network

  nginx_service:
    image: nginx:alpine
    container_name: vv-nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Montar los certificados SSL desde el host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - postgres_service
      - api_service
    networks:
      - vv-network

networks:
  vv-network:
    driver: bridge

volumes:
  pgdata:

