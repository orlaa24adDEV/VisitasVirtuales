events {
    worker_connections 1024;
}

http {
    # Configuración SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Compresión
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;

    upstream vv-api {
        server api_service:3000;
    }

    server {
        listen 443 ssl;
        server_name : visitasvirtuales.dedyn.io;

        ssl_certificate /etc/letsencrypt/live/visitasvirtuales.dedyn.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/visitasvirtuales.dedyn.io/privkey.pem;

        # Headers de seguridad
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Proxy para las solicitudes a la API
        location /api/v1/ {
            proxy_pass http://vv-api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Documentación OpenAPI
        location /api-docs {
            proxy_pass http://vv-api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Redirigir tráfico HTTP a HTTPS
    server {
        listen 8080;
        server_name visitasvirtuales.dedyn.io;

        return 301 https://$host$request_uri;
    }
}
